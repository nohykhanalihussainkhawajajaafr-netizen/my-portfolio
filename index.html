<!DOCTYPE html>
<html>
<head>
    <title>Ali Hussain Portfolio</title>
    <style>
        /* Body Style */
        body{
            background-color: #e6f2ff;
            font-family: Arial;
            text-align: center;
        }

        /* Big Name */
        .name{
            font-size: 60px;
            color: white;
            background-color: #4CAF50;
            padding: 20px 40px;
            border-radius: 25px;
            width: 600px;
            margin: 20px auto;
        }

        /* Moving Welcome Text */
        .marquee{
            display: inline-block;
            font-size: 30px;
            color: white;
            background-color: #ff9800;
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            animation: moveText 5s linear infinite alternate;
        }

        @keyframes moveText{
            0% {transform: translateX(0px);}
            100% {transform: translateX(250px);}
        }

        /* Profile Image */
        img{
            width: 150px;
            border-radius: 50%;
            margin-top: 20px;
        }

        /* Headings */
        h2{
            color: #333;
            margin-top: 30px;
        }

        /* Paragraph */
        p{
            color: #555;
            font-size: 16px;
        }

        /* Skills */
        ul{
            list-style-type: none;
            padding: 0;
        }

        li{
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 20px;
        }

        /* Projects */
        .projects{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .project{
            background-color: #ff9800;
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 150px;
            text-align: center;
            transition: transform 0.3s;
        }

        .project:hover{
            transform: scale(1.1);
        }

        /* Buttons */
        .btn{
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 25px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .btn:hover{
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <!-- Big Name -->
    <div class="name">Ali Hussain</div>

    <!-- Moving Welcome Text -->
    <div class="marquee">Welcome to My Portfolio</div>

    <!-- Profile Image -->
    <img src="profile.jpg" alt="Profile Image">

    <!-- About Me -->
    <h2>About Me</h2>
    <p>Hi, my name is Ali Hussain. I am learning website development and building my first portfolio website.</p>

    <!-- Skills -->
    <h2>My Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>Web Design</li>
    </ul>

    <!-- Projects -->
    <h2>My Projects</h2>
    <div class="projects">
        <div class="project">Project 1</div>
        <div class="project">Project 2</div>
        <div class="project">Project 3</div>
    </div>

    <!-- Contact -->
    <h2>Contact Me</h2>
    <a href="#" class="btn">Facebook</a>
    <a href="#" class="btn">WhatsApp</a>
    <a href="mailto:ali@example.com" class="btn">Email</a>

</body>
</html>
